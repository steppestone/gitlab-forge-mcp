name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Mondays 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        # Run the binary directly (not gitleaks-action) so no GITLEAKS_LICENSE
        # is required — the action mandates a license key for organization repos.
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            zricethezav/gitleaks:v8.21.2 \
            detect --source=/repo --redact --verbose --exit-code 1
